<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnTheBubble — Player Card</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #BCB43E;
    --gold-dim: rgba(188, 180, 62, 0.12);
    --gold-mid: rgba(188, 180, 62, 0.35);
    --bg: #0D0D0D;
    --surface-1: #161616;
    --surface-2: #1E1E1E;
    --surface-3: #272727;
    --text-primary: #F0F0F0;
    --text-secondary: #888;
    --text-dim: #555;
    --green: #4CAF7D;
    --red: #E05555;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 60px;
  }

  /* NAV */
  .nav {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .logo { cursor: pointer; }
  .logo svg { height: 50px; width: auto; margin-left: -10px; }
  .back-btn {
    width: 36px; height: 36px;
    background: var(--surface-2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .back-btn svg { width: 16px; height: 16px; stroke: var(--text-secondary); }

  /* CARD */
  .card {
    width: 100%;
    max-width: 420px;
    background: #111111;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid #1A1A1A;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CARD HEADER */
  .card-header {
    background: transparent;
    padding: 24px 24px 20px;
    position: relative;
    border-bottom: 1px solid #1C1C1C;
  }


  .player-meta {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--surface-3);
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text-primary);
  }
  .player-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-weight: 400;
  }

  /* RATING ROW */
  .rating-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .rating-block {
    flex: 1;
    background: var(--surface-3);
    border-radius: 10px;
    padding: 15px 14px;
  }
  .rating-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .rating-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    line-height: 1;
  }
  .rating-sub {
    font-size: 12px;
    font-weight: 500;
    margin-top: 3px;
    color: var(--text-dim);
  }
  .bubble-box-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .bubble-box-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .pulse-text {
    animation: textPulse 2s ease infinite;
  }
  @keyframes textPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* BUBBLE METER */
  .bubble-section {
    padding: 20px 24px;
    border-bottom: 1px solid #1E1E1E;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .meter-track {
    height: 6px;
    background: var(--surface-3);
    border-radius: 99px;
    position: relative;
    overflow: visible;
  }
  .meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 99px;
    position: relative;
    transition: width 1s ease;
  }
  .meter-marker {
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    background: var(--gold);
    border-radius: 50%;
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px rgba(188, 180, 62, 0.5);
  }
  .meter-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .meter-labels span {
    font-size: 10px;
    color: var(--text-dim);
  }
  .meter-labels .active {
    color: var(--gold);
    font-weight: 600;
  }

  /* STATS GRID */
  .stats-section {
    padding: 20px 24px;
    border-bottom: 1px solid #1E1E1E;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .stat-cell {
    background: #1C1C1C;
    border-radius: 8px;
    padding: 15px 10px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    color: var(--text-primary);
  }
  .stat-num.accent { color: var(--gold); }
  .stat-num.green  { color: var(--green); }
  .stat-num.red    { color: var(--red); }
  .stat-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* RECENT MATCHES */
  .matches-section {
    padding: 20px 24px;
  }
  .match-row {
    padding: 13px 0;
    border-bottom: 1px solid #191919;
  }
  .match-row:last-child { border-bottom: none; }
  .match-date {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: 2px;
    padding-left: 40px;
    text-transform: uppercase;
  }
  .match-main {
    display: flex;
    align-items: center;
  }
  .match-result {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .match-result.win  { background: rgba(76, 175, 125, 0.15); color: var(--green); }
  .match-result.loss { background: rgba(224, 85, 85, 0.12); color: var(--red); }
  .match-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    padding: 0 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .match-score {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(3, 26px);
    gap: 0 4px;
  }
  .match-score .set { text-align: center; }
  .match-score.win { color: var(--green); }
  .match-score.loss { color: var(--red); }
  .match-meta {
    padding-left: 40px;
  }
  .match-meta .opp-date {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .empty-state {
    padding: 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }
</style>
</head>
<body>

  <div class="nav">
    <div class="logo" onclick="location.href='index.html'"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300"><defs><style>.otb0{fill:#bcb43e}.otb1{fill:#646464}</style></defs><path class="otb1" d="M57.72,149.75c0-28.7,5.41-40.29,18.77-40.29s18.66,11.59,18.66,40.29-5.3,40.73-18.66,40.73-18.77-13.03-18.77-40.73ZM85.87,149.75c0-23.18-2.65-32.12-9.38-32.12s-9.38,8.94-9.38,32.12,2.98,32.67,9.38,32.67,9.38-9.6,9.38-32.67Z"/><path class="otb1" d="M130.58,189.59l-17.99-61.93h-.22v61.93h-7.95v-79.26h11.48l14.68,51.55h.22v-51.55h8.06v79.26h-8.28Z"/><path class="otb1" d="M158.5,189.59v-70.98h-12.91v-8.28h34.66v8.28h-12.8v70.98h-8.94Z"/><path class="otb1" d="M211.71,189.59v-37.42h-15.79v37.42h-8.94v-79.26h8.94v33.67h15.79v-33.67h8.83v79.26h-8.83Z"/><path class="otb1" d="M231.8,189.59v-79.26h29.69v8.28h-20.75v25.83h16.01v8.17h-16.01v28.7h22.08v8.28h-31.02Z"/><path class="otb0" d="M268.78,189.59v-79.26h17.77c16.01,0,23.51,5.74,23.51,21.64,0,8.28-3.31,13.47-8.83,16.23v.22c6.95,2.87,9.71,8.83,9.71,17.88,0,19.54-10.16,23.29-24.28,23.29h-17.88ZM287.44,142.24c4.75,0,6.18-2.98,6.18-9.05s-2.32-8.17-5.74-8.17h-3.42v17.22h2.98ZM288.43,174.91c3.97,0,5.85-2.32,5.85-9.6s-1.77-9.82-6.4-9.82h-3.42v19.43h3.97Z"/><path class="otb0" d="M342.52,110.34h15.79v58.17c0,14.9-6.62,21.52-20.42,21.52s-20.31-6.62-20.31-21.52v-58.17h16.01v59.39c0,5.08,1.66,6.84,4.42,6.84s4.53-1.77,4.53-6.84v-59.39Z"/><path class="otb0" d="M366.91,189.59v-79.26h17.77c16.01,0,23.51,5.74,23.51,21.64,0,8.28-3.31,13.47-8.83,16.23v.22c6.95,2.87,9.71,8.83,9.71,17.88,0,19.54-10.16,23.29-24.28,23.29h-17.88ZM385.57,142.24c4.75,0,6.18-2.98,6.18-9.05s-2.32-8.17-5.74-8.17h-3.42v17.22h2.98ZM386.56,174.91c3.97,0,5.85-2.32,5.85-9.6s-1.77-9.82-6.4-9.82h-3.42v19.43h3.97Z"/><path class="otb0" d="M415.93,189.59v-79.26h17.77c16.01,0,23.51,5.74,23.51,21.64,0,8.28-3.31,13.47-8.83,16.23v.22c6.95,2.87,9.71,8.83,9.71,17.88,0,19.54-10.16,23.29-24.28,23.29h-17.88ZM434.58,142.24c4.75,0,6.18-2.98,6.18-9.05s-2.32-8.17-5.74-8.17h-3.42v17.22h2.98ZM435.58,174.91c3.97,0,5.85-2.32,5.85-9.6s-1.77-9.82-6.4-9.82h-3.42v19.43h3.97Z"/><path class="otb0" d="M464.94,189.59v-79.26h16.01v64.35h19.76v14.9h-35.77Z"/><path class="otb0" d="M505.34,189.59v-79.26h35.54v14.9h-19.54v16.34h15.67v14.24h-15.67v18.88h20.64v14.9h-36.65Z"/></svg></div>

      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>

  </div>

  <div class="card" id="card">
    <div class="empty-state">Loading...</div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const playerId   = params.get('id');
const playerName = params.get('name');

async function load() {
  let player, courts = [];

  try {
    // Resolve player name first, then always use aggregated profile
    let name = playerName;
    if (!name && playerId) {
      const row = await fetch(`/api/players/${playerId}`).then(r => r.json());
      name = row?.name;
    }
    if (name) {
      player = await fetch(`/api/players/profile?name=${encodeURIComponent(name)}`).then(r => r.json());
    }
  } catch(e) {}

  if (!player) {
    document.getElementById('card').innerHTML = '<div class="empty-state">Player not found.</div>';
    return;
  }

  try {
    courts = await fetch(`/api/players/courts?name=${encodeURIComponent(player.name)}`).then(r => r.json());
  } catch(e) {}

  renderCard(player, courts);
}

function initials(name) {
  return (name || '').split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

const DISTRICT_NAMES = {
  NEOTA: 'Northeastern Ohio Area',
  SWOTA: 'Southwestern Ohio Area',
  COTA:  'Central Ohio Area',
  NWOTA: 'Northwestern Ohio Area',
};

function parseLeague(league) {
  if (!league) return { line1: '', line2: '' };
  const s = league.replace(/^\d{4}\s*/, '');
  const genderMap = { M: 'Men', W: 'Women', X: 'Mixed' };

  // Format 1: scraped "Adult 40+ Midwest Northeastern Ohio Area M 4.0"
  const m = s.match(/^(?:Adult|Mixed)\s+(\d+\+)\s+(.+?)\s+([MWX])\s+([\d.]+)$/);
  if (m) {
    const parts = m[2].split(' ');
    return {
      line1: `${m[1]} ${m[4]} ${genderMap[m[3]] || m[3]}`,
      line2: `${parts[0][0].toUpperCase() + parts[0].slice(1).toLowerCase()} \u2022 ${parts.slice(1).join(' ')}`
    };
  }

  // Format 2: USTA "NEOTA Mixed 40 & Over" or "NEOTA Mixed 40 & Over (Subflight 2)"
  const u = s.match(/^(NEOTA|SWOTA|COTA|NWOTA)\s+(Adult|Mixed)\s+(\d+)\s+&\s+Over(?:\s+\((.+?)\))?$/i);
  if (u) {
    const district = DISTRICT_NAMES[u[1].toUpperCase()] || u[1];
    const type = u[2];
    const age = u[3] + '+';
    // Try to extract level from subflight info or default
    const sub = u[4] || '';
    const levelMatch = sub.match(/([\d.]+)/);
    const level = levelMatch ? Number(levelMatch[1]).toFixed(1) : '';
    const gender = type === 'Mixed' ? 'Mixed' : 'Men';
    return {
      line1: level ? `${age} ${level} ${gender}` : `${age} ${gender}`,
      line2: `Midwest \u2022 ${district}`
    };
  }

  return { line1: s, line2: '' };
}

function bubblePct(ntrp, dynamic_rating) {
  if (!ntrp || !dynamic_rating) return 0;
  // ntrp cert IS the ceiling; floor = ntrp - 0.5
  // Position within the player's actual NTRP band, 0% = floor, 100% = ceiling
  const pct = ((dynamic_rating - (ntrp - 0.5)) / 0.5) * 100;
  return Math.min(100, Math.max(0, pct));
}

function streakColor(streak) {
  if (!streak || streak === 'None') return '';
  return streak.startsWith('W') ? 'green' : 'red';
}

function renderCard(p, courts) {
  const s = p.stats || {};
  const status = p.bubble_status || 'safe';

  const ntrp = p.ntrp ? p.ntrp.toFixed(1) : '—';
  const dynRating = p.dynamic_rating ? p.dynamic_rating.toFixed(2) : '—';
  // Dynamic rating color: red = near bump up, blue = near bump down, green = safe
  const dynColor = (p.ntrp && p.dynamic_rating)
    ? (p.dynamic_rating >= p.ntrp - 0.05 ? 'var(--red)' : p.dynamic_rating <= (p.ntrp - 0.5) + 0.05 ? 'var(--yellow)' : 'var(--green)')
    : 'var(--text-primary)';

  const meterPct = bubblePct(p.ntrp, p.dynamic_rating);

  // Current season stats (current year only)
  const curW = p.current_wins || 0;
  const curL = p.current_losses || 0;
  const record   = `${curW}-${curL}`;
  const winPct   = curW + curL > 0 ? `${Math.round(curW/(curW+curL)*100)}%` : '—';
  const streak   = s.streak_2025   || '—';
  const longestW = s.longest_win_2025  ?? '—';
  const longestL = s.longest_loss_2025 ?? '—';
  const avgOpp   = s.avg_opp_rating_2025 ? s.avg_opp_rating_2025.toFixed(2) : '—';
  const setTbPct = s.set_tb_pct_2025    != null ? `${s.set_tb_pct_2025}%` : '—';
  const thirdPct = s.third_set_pct_2025 != null ? `${s.third_set_pct_2025}%` : '—';
  const postPct  = s.postseason_pct_2025 != null ? `${s.postseason_pct_2025}%` : '—';

  // Percentage color rule: > 50% green, exactly 50% white, < 50% red
  const pctClass = v => v != null ? (v > 50 ? 'green' : v < 50 ? 'red' : '') : '';
  // Record color rule: winning green, losing red, even white
  const recordClass = (w, l) => w > l ? 'green' : w < l ? 'red' : '';
  const recordStrClass = str => {
    if (!str) return '';
    const parts = str.split('-').map(Number);
    return parts.length === 2 ? recordClass(parts[0], parts[1]) : '';
  };
  const curRecordClass = recordClass(curW, curL);
  const winPctRaw = curW + curL > 0 ? Math.round(curW/(curW+curL)*100) : null;
  const winPctClass  = pctClass(winPctRaw);
  const setTbClass   = pctClass(s.set_tb_pct_2025);
  const thirdClass   = pctClass(s.third_set_pct_2025);
  const postClass    = pctClass(s.postseason_pct_2025);

  // Recent match rows from court appearances (all leagues, sorted by date)
  const INITIAL_MATCHES = 6;
  const allMatchRows = courts.map(c => {
    const isHome    = c.home_player1 === p.name || c.home_player2 === p.name;
    const won       = c.winner === (isHome ? 'home' : 'away');
    const partners  = isHome
      ? [c.home_player1, c.home_player2].filter(n => n && n !== p.name)
      : [c.away_player1, c.away_player2].filter(n => n && n !== p.name);
    const opponents = isHome
      ? [c.away_player1, c.away_player2].filter(n => n && n.trim())
      : [c.home_player1, c.home_player2].filter(n => n && n.trim());
    const oppLabel  = opponents.map(n => n.split(' ').pop()).join(' & ');
    const partnerLabel = partners.length ? ` w/ ${partners[0].split(' ').pop()}` : '';
    const lg = parseLeague(c.league);
    return `
      <div class="match-row">
        <div class="match-date">${formatDate(c.date)}</div>
        <div class="match-main">
          <div class="match-result ${won ? 'win' : 'loss'}">${won ? 'W' : 'L'}</div>
          <div class="match-name">vs ${oppLabel}${partnerLabel}</div>
          <div class="match-score ${won ? 'win' : 'loss'}">${(() => { const sets = (c.score || '').split(/\s+/).filter(Boolean); while (sets.length < 3) sets.unshift(''); return sets.map(s => '<span class="set">' + s + '</span>').join(''); })()}</div>
        </div>
        <div class="match-meta">
          <div class="opp-date">${[lg.line1, lg.line2].filter(Boolean).join(' \u2022 ')}</div>
        </div>
      </div>`;
  });
  let matchRows;
  if (allMatchRows.length <= INITIAL_MATCHES) {
    matchRows = allMatchRows.join('');
  } else {
    matchRows = allMatchRows.slice(0, INITIAL_MATCHES).join('') +
      '<div id="hiddenMatches" style="display:none">' + allMatchRows.slice(INITIAL_MATCHES).join('') + '</div>' +
      '<div id="showMoreBtn" style="text-align:center;padding:14px 0">' +
        '<button onclick="document.getElementById(\'hiddenMatches\').style.display=\'block\';this.parentElement.style.display=\'none\';" ' +
        'style="background:var(--surface-3);border:1px solid var(--divider);border-radius:var(--radius-sm);' +
        'padding:10px 24px;font-family:\'DM Sans\',sans-serif;font-size:12px;font-weight:600;' +
        'letter-spacing:0.08em;text-transform:uppercase;color:var(--text-secondary);cursor:pointer;' +
        'transition:all 0.2s">Show All ' + allMatchRows.length + ' Matches</button>' +
      '</div>';
  }

  document.title = `OnTheBubble — ${p.name}`;
  document.getElementById('card').innerHTML = `
    <!-- HEADER -->
    <div class="card-header">
      <div class="player-meta">
        <div class="avatar">${initials(p.name)}</div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-sub">${[p.location, p.gender].filter(Boolean).join(' \u2022 ')}</div>
        </div>
      </div>
      <div class="rating-row">
        <div class="rating-block">
          <div class="rating-label">NTRP Level</div>
          <div class="rating-value">${ntrp}</div>
          <div class="rating-sub">${s.ntrp_date ? `Since ${s.ntrp_date.split('/').pop()}` : ''}</div>
        </div>
        <div class="rating-block">
          <div class="rating-label">Dynamic Est.</div>
          <div class="rating-value" style="color:${dynColor}">${dynRating}</div>
          <div class="rating-sub"></div>
        </div>
      </div>
      <div class="rating-row">
        <div class="rating-block" style="flex:1">
          <div class="bubble-box-label">On The Bubble</div>
          <div class="bubble-box-value ${status==='risk' || status==='risk_down' || status==='on_bubble' ? 'pulse-text' : ''}" style="color:${
            status==='risk'      ? 'var(--red)'    :
            status==='risk_down' ? 'var(--yellow)' :
            status==='on_bubble' ? 'var(--gold)'   : 'var(--green)'
          }">${
            status==='risk'      ? 'Bump Up Notice \u2022 High'   :
            status==='risk_down' ? 'Bump Down Risk \u2022 High'   :
            status==='on_bubble' ? 'Monitor Closely'              : 'Safe \u2022 In Range'
          }</div>
        </div>
      </div>
    </div>

    <!-- BUBBLE METER -->
    <div class="bubble-section">
      <div class="section-label">ONTHE<span style="color:var(--gold)">BUBBLE</span> BUMP RISK METER FOR ${ntrp}</div>
      <div class="meter-track">
        <div class="meter-fill" style="width:${meterPct}%;background:${
          meterPct >= 90 ? 'linear-gradient(90deg,var(--gold),var(--red))' :
          meterPct <= 10 ? 'linear-gradient(90deg,var(--yellow),var(--yellow))' :
          'linear-gradient(90deg,var(--green),var(--gold))'
        }">
          <div class="meter-marker" style="background:${
            meterPct >= 90 ? 'var(--red)' :
            meterPct <= 10 ? 'var(--yellow)'   : 'var(--gold)'
          };box-shadow:0 0 10px ${
            meterPct >= 90 ? 'rgba(224,85,85,0.5)' :
            meterPct <= 10 ? 'rgba(106,174,230,0.5)' : 'rgba(188,180,62,0.5)'
          }"></div>
        </div>
      </div>
      <div class="meter-labels">
        <span>${p.ntrp ? (p.ntrp - 0.5).toFixed(1) : '—'} floor</span>
        <span class="active">${meterPct.toFixed(0)}% of range</span>
        <span>${ntrp} ceiling</span>
      </div>
    </div>

    <!-- CURRENT SEASON -->
    <div class="stats-section">
      <div class="section-label">Current Season Overview</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-num ${curRecordClass}">${record}</div>
          <div class="stat-desc">Record</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num ${winPctClass}">${winPct}</div>
          <div class="stat-desc">Win Rate</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num ${streakColor(streak)}">${streak}</div>
          <div class="stat-desc">Streak</div>
        </div>
      </div>
    </div>

    <!-- 2025 SEASON SNAPSHOT -->
    <div class="stats-section">
      <div class="section-label">2025 Season Overview</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-num ${recordStrClass(s.record_2025)}">${s.record_2025 || '—'}</div>
          <div class="stat-desc">Record</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num ${pctClass(s.win_pct_2025)}">${s.win_pct_2025 != null ? s.win_pct_2025 + '%' : '—'}</div>
          <div class="stat-desc">Win Rate</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num ${recordStrClass(s.postseason_record_2025)}">${s.postseason_record_2025 || '—'}</div>
          <div class="stat-desc">Postseason</div>
        </div>
      </div>
    </div>

    <!-- STREAK RECORDS -->
    <div class="stats-section">
      <div class="section-label">Streak Records</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-num ${longestW !== '—' ? 'green' : ''}">${longestW}</div>
          <div class="stat-desc">Longest Win</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num ${longestL !== '—' ? 'red' : ''}">${longestL}</div>
          <div class="stat-desc">Longest Loss</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num">${avgOpp}</div>
          <div class="stat-desc">Avg Opp Rtg</div>
        </div>
      </div>
    </div>

    <!-- CLUTCH STATS -->
    <div class="stats-section">
      <div class="section-label">Clutch Performance</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-num ${setTbClass}">${setTbPct}</div>
          <div class="stat-desc">Set Tiebreak</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num ${thirdClass}">${thirdPct}</div>
          <div class="stat-desc">3rd Set TB</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num ${postClass}">${postPct}</div>
          <div class="stat-desc">Postseason</div>
        </div>
      </div>
    </div>

    <!-- RECENT MATCHES -->
    <div class="matches-section">
      <div class="section-label">Recent Matches</div>
      ${matchRows || '<div class="empty-state" style="padding:12px 0">No match history in current season</div>'}
    </div>
  `;
}

load();
</script>
</body>
</html>
