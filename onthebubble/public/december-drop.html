<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bump Day — by OnTheBubble</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #BCB43E;
    --gold-dim: rgba(188, 180, 62, 0.10);
    --gold-mid: rgba(188, 180, 62, 0.30);
    --bg: #0D0D0D;
    --card: #111111;
    --card-border: #1A1A1A;
    --surface-3: #1C1C1C;
    --text-primary: #F0F0F0;
    --text-secondary: #888;
    --text-dim: #444;
    --green: #4CAF7D;
    --green-dim: rgba(76, 175, 125, 0.07);
    --green-mid: rgba(76, 175, 125, 0.20);
    --red: #E05555;
    --red-dim: rgba(224, 85, 85, 0.07);
    --red-mid: rgba(224, 85, 85, 0.20);
    --divider: #1C1C1C;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 16px 60px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .logo { cursor: pointer; }
  .logo svg { height: 50px; width: auto; margin-left: -10px; }

  /* PAGE HEADER */
  .page-header {
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .page-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 0.03em;
    line-height: 1;
    color: var(--text-primary);
  }
  .page-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
  }
  .page-sub strong { color: var(--text-primary); font-weight: 600; }

  /* DISTRICT PILLS */
  .filter-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 20px;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-pills {
    display: flex;
    gap: 6px;
    width: max-content;
  }
  .pill {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: 1px solid var(--divider);
    color: var(--text-secondary);
    background: transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .pill.active {
    background: var(--gold-dim);
    border-color: var(--gold-mid);
    color: var(--gold);
  }
  .pill:hover:not(.active) {
    border-color: #333;
    color: var(--text-primary);
  }

  /* SUMMARY PILLS */
  .summary-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }
  .summary-pill {
    flex: 1;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: center;
  }
  .summary-pill.up {
    background: var(--green-dim);
    border: 1px solid var(--green-mid);
  }
  .summary-pill.down {
    background: var(--red-dim);
    border: 1px solid var(--red-mid);
  }
  .summary-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
  }
  .summary-pill.up .summary-num { color: var(--green); }
  .summary-pill.down .summary-num { color: var(--red); }
  .summary-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .summary-pill.up .summary-label { color: var(--green); opacity: 0.7; }
  .summary-pill.down .summary-label { color: var(--red); opacity: 0.7; }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .section-title.up { color: var(--green); }
  .section-title.down { color: var(--red); }
  .section-line {
    flex: 1;
    height: 1px;
  }
  .section-line.up { background: var(--green-mid); }
  .section-line.down { background: var(--red-mid); }

  /* RESULT ROWS */
  .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 17px 0;
    border-bottom: 1px solid var(--divider);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .result-row:active { opacity: 0.7; }

  .result-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }
  .result-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--surface-3);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .result-avatar.up {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green-mid);
  }
  .result-avatar.down {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--red-mid);
  }
  .result-info { flex: 1; }
  .result-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .result-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 3px;
  }

  .result-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
    padding-left: 12px;
  }

  /* Rating change */
  .rating-change {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .old-ntrp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--text-dim);
    line-height: 1;
  }
  .arrow {
    font-size: 11px;
  }
  .arrow.up { color: var(--green); }
  .arrow.down { color: var(--red); }
  .new-ntrp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
  }
  .new-ntrp.up { color: var(--green); }
  .new-ntrp.down { color: var(--red); }

  .dyn-rating {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: right;
  }

  /* Chevron */
  .chevron { color: var(--text-dim); margin-left: 8px; flex-shrink: 0; }
  .chevron svg { width: 14px; height: 14px; stroke: currentColor; }

  /* Spacer between sections */
  .section-spacer { margin-bottom: 24px; }
  .section-gap { margin-top: 32px; }

</style>
</head>
<body>

  </div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-eyebrow">Annual Ratings Release</div>
    <div class="page-title">Bump Day 12.01</div>
    <div class="page-sub">2025 Ratings Update · 187 players affected</div>
  </div>

  <!-- DISTRICT -->
  <div class="section-header" style="margin-bottom: 8px;">
    <div class="section-title" style="color: var(--text-dim);">District</div>
    <div class="section-line" style="background: var(--divider);"></div>
  </div>
  <div class="filter-scroll">
    <div class="filter-pills">
      <div class="pill active" onclick="selectDistrict(this)">Northeastern Ohio Area</div>
      <div class="pill" onclick="selectDistrict(this)">Northwestern Ohio</div>
      <div class="pill" onclick="selectDistrict(this)">Ohio Valley</div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- PLAYER LISTS -->

  <script>
  var ARROW_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
  var CHEV_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

  var districts = {
    'Northeastern Ohio Area': {

        { name: 'Eileen Connell',     sub: 'Cleveland, OH • F',        from: '3.5', to: '4.0', dyn: '3.58' },
        { name: 'Gary Fleming',       sub: 'Mentor, OH • M',           from: '3.5', to: '4.0', dyn: '3.57' },
        { name: 'Vu Nguyen',          sub: 'Kent, OH • M',             from: '3.5', to: '4.0', dyn: '3.55' }
      ],
      down: [

        { name: 'Denise Hwang',      sub: 'Cleveland, OH • F',         from: '3.5', to: '3.0', dyn: '3.10' },

      ]
    }
  };

  function initials(name) {
    return name.split(' ').map(function(w) { return w[0]; }).join('');
  }

  function renderRow(p, dir) {
    return '<div class="result-row">' +
      '<div class="result-left">' +
        '<div class="result-avatar ' + dir + '">' + initials(p.name) + '</div>' +
        '<div class="result-info">' +
          '<div class="result-name">' + p.name + '</div>' +
          '<div class="result-sub">' + p.sub + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="result-right">' +
        '<div class="rating-change">' +
          '<div class="old-ntrp">' + p.from + '</div>' +
          '<div class="arrow ' + dir + '">' + ARROW_SVG + '</div>' +
          '<div class="new-ntrp ' + dir + '">' + p.to + '</div>' +
        '</div>' +
        '<div class="dyn-rating">Dynamic ' + p.dyn + '</div>' +
      '</div>' +
      '<div class="chevron">' + CHEV_SVG + '</div>' +
    '</div>';
  }

  function renderDistrict(name) {
    var d = districts[name];
    var total = d.upCount + d.downCount;

    document.querySelector('.page-sub').textContent = '2025 Ratings Update \u00B7 ' + total + ' players affected';

    document.getElementById('summaryRow').innerHTML =
      '<div class="summary-pill up"><div class="summary-num">' + d.upCount + '</div><div class="summary-label">Bumped Up</div></div>' +
      '<div class="summary-pill down"><div class="summary-num">' + d.downCount + '</div><div class="summary-label">Bumped Down</div></div>';

    var html = '<div class="section-spacer"><div class="section-header">' +
      '<div class="section-title up">Moving Up</div><div class="section-line up"></div></div></div>';
    d.up.forEach(function(p) { html += renderRow(p, 'up'); });

    html += '<div class="section-gap"><div class="section-header">' +
      '<div class="section-title down">Moving Down</div><div class="section-line down"></div></div></div>';
    d.down.forEach(function(p) { html += renderRow(p, 'down'); });

    document.getElementById('playerLists').innerHTML = html;
  }

  function selectDistrict(el) {
    document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
    el.classList.add('active');
    renderDistrict(el.textContent);
  }

  renderDistrict('Northeastern Ohio Area');
  </script>
